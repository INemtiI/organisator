name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]  # Или "master", смотрите вашу основную ветку
  workflow_dispatch:    # Кнопка для ручного запуска

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Или 18, смотрите ваш проект
          cache: 'npm'
          
      - name: Install
        run: npm ci  # Чистая установка зависимостей
        
      - name: Build
        run: npm run build  # Запускаем сборку
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # Важно: если используется React, тут обычно 'build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4